services:
  - type: web
    name: futurelens-backend
    env: python
    rootDir: backend
    buildCommand: "pip install -r requirements.txt"
    startCommand: "uvicorn main:app --host 0.0.0.0 --port $PORT"
    envVars:
      - key: PYTHON_VERSION
        value: 3.10.0
      - key: DATABASE_URL
        value: "sqlite+aiosqlite:///./data/futurelens.db"
      - key: ALLOWED_ORIGINS
        value: "*"
      # You can add OPENAI_API_KEY here via Render dashboard
    disk:
      name: futurelens-data
      mountPath: /opt/render/project/src/backend/data
      sizeGB: 1
